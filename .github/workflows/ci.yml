name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r requirements.txt
      - name: Ruff lint
        run: ruff check .
      - name: Compile check (syntax)
        run: python -m compileall -q .
      # Only the perftest suite runs in CI: it is pure Python (stdlib +
      # requests) and needs no Senzing engine. The other test_*.py modules
      # start the Flask app / real Senzing engine and require the Senzing
      # runtime at /opt/senzing, which is unavailable in CI.
      - name: Run engine-free tests
        run: pytest test_sz_search_flask_perftest.py -q
